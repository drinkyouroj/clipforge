name: clipforge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clipforge
      POSTGRES_PASSWORD: clipforge
      POSTGRES_DB: clipforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9011"
    environment:
      MINIO_ROOT_USER: clipforge
      MINIO_ROOT_PASSWORD: clipforge
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 clipforge clipforge;
      mc mb --ignore-existing local/clipforge-uploads;
      exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
